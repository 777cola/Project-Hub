<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>戚俊皓 · 项目枢纽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+SC:wght@200;300;400;500&family=Noto+Sans+TC:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    body{
      font-family:'Inter','Noto Sans SC','Noto Sans TC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#f4f2ee;color:#1a1a1a;
      min-height:100vh;overflow:hidden;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      user-select:none;
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:999;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat:repeat;background-size:256px 256px;
    }
    #cursor-glow{
      position:fixed;pointer-events:none;z-index:0;
      width:800px;height:800px;border-radius:50%;
      background:radial-gradient(circle,rgba(180,140,100,.07) 0%,transparent 70%);
      transform:translate(-50%,-50%);will-change:transform;
    }

    /* ── Lang Toggle ── */
    #lang-toggle{
      position:fixed;top:2rem;right:2.5rem;z-index:100;
      display:flex;align-items:center;background:#fff;
      border:1px solid rgba(0,0,0,.06);border-radius:16px;padding:4px;
      box-shadow:0 2px 16px rgba(0,0,0,.04);
    }
    .lang-btn{
      display:flex;align-items:center;gap:0;background:transparent;border:none;
      font-family:inherit;font-size:.8rem;font-weight:400;letter-spacing:.04em;
      color:rgba(0,0,0,.2);cursor:pointer;padding:.4rem .5rem;border-radius:12px;
      white-space:nowrap;
      transition:color .3s,background .3s,box-shadow .3s,padding .45s cubic-bezier(.22,1,.36,1);
    }
    .lang-btn .abbr{display:inline-block}
    .lang-btn .full{
      display:inline-block;max-width:0;overflow:hidden;vertical-align:middle;
      white-space:nowrap;
      transition:max-width .45s cubic-bezier(.22,1,.36,1),opacity .3s ease;
      opacity:0;
    }
    .lang-btn.active{color:#1a1a1a;background:rgba(0,0,0,.04);box-shadow:0 1px 3px rgba(0,0,0,.04);padding:.4rem .85rem}
    .lang-btn.active .full{max-width:80px;opacity:1;margin-left:6px}
    .lang-btn:not(.active):hover{color:rgba(0,0,0,.45);background:rgba(0,0,0,.02)}

    /* ── Orbit ── */
    .orbit-wrap{position:relative;z-index:1;width:100%;height:100vh;display:flex;align-items:center;justify-content:center}
    .orbit-view{position:relative;width:860px;height:860px;display:flex;align-items:center;justify-content:center}

    .orb-ring{
      position:absolute;top:50%;left:50%;border-radius:50%;transform:translate(-50%,-50%);
      pointer-events:none;will-change:transform;
    }
    .orb-ring.r1{width:640px;height:640px;border:1px solid rgba(0,0,0,.08)}
    .orb-ring.r2{width:520px;height:520px;border:1px dashed rgba(0,0,0,.05)}
    .orb-ring.r3{width:340px;height:340px;border:1px solid rgba(0,0,0,.05)}

    .orb-dot{
      position:absolute;top:50%;left:50%;
      width:6px;height:6px;margin:-3px 0 0 -3px;
      border-radius:50%;background:rgba(0,0,0,.08);
      will-change:transform;transition:background .4s,transform .4s;
    }
    .orb-dot.active{background:#b48a64;transform:scale(1.8)}

    /* ── Center Hub ── */
    .center-hub{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:176px;height:176px;border-radius:50%;
      border:1px solid rgba(0,0,0,.07);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(255,255,255,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      pointer-events:none;z-index:10;
      box-shadow:0 0 60px rgba(180,140,100,.08),inset 0 1px 0 rgba(255,255,255,.6);
      will-change:transform;
    }
    .center-hub .name-cn{font-size:1.6rem;font-weight:400;letter-spacing:.06em;color:rgba(0,0,0,.75);line-height:1.2}
    .center-hub .name-en{font-size:.95rem;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:rgba(0,0,0,.55);margin-top:4px}
    .center-hub .role{font-size:.8rem;font-weight:400;letter-spacing:.12em;color:rgba(0,0,0,.45);margin-top:6px}

    .pulse-ring{
      position:absolute;top:50%;left:50%;
      width:176px;height:176px;margin:-88px 0 0 -88px;
      border-radius:50%;border:1px solid rgba(180,140,100,.15);
      pointer-events:none;opacity:0;transform:scale(1);
      transition:opacity .4s,transform .6s cubic-bezier(.22,1,.36,1);
    }
    .pulse-ring.visible{opacity:1;transform:scale(1.35)}

    /* ── Orbit Nodes ── */
    .project-node{
      position:absolute;top:50%;left:50%;
      cursor:pointer;will-change:transform,opacity;
      transition:opacity .5s,filter .5s;
      z-index:5;
    }
    .project-node .node-hit{
      display:flex;align-items:center;justify-content:center;
      position:relative;
    }
    .project-node .node-num{
      font-size:.7rem;font-weight:500;letter-spacing:.08em;
      color:#b48a64;margin-bottom:3px;text-align:center;
      transition:color .3s;
    }
    .project-node .node-title{
      font-size:1.25rem;font-weight:400;letter-spacing:.04em;
      color:#1a1a1a;line-height:1.3;text-align:center;
      transition:color .3s;
    }
    .project-node .node-desc{
      font-size:.85rem;font-weight:400;letter-spacing:.03em;
      color:#1a1a1a;opacity:.4;line-height:1.4;text-align:center;
      transition:opacity .3s;
    }
    .project-node .node-glow-ring{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:80px;height:80px;border-radius:50%;
      border:1.5px solid transparent;
      pointer-events:none;
      transition:all .4s cubic-bezier(.22,1,.36,1);
      opacity:0;
    }

    /* ── Hover ── */
    .project-node:hover .node-num{color:#b48a64}
    .project-node:hover .node-title{color:#b48a64}
    .project-node:hover .node-desc{opacity:.6}

    /* ── Active (点击选中) ── */
    .project-node.active .node-hit{animation:nodePop .45s cubic-bezier(.22,1,.36,1) forwards}
    .project-node.active .node-num{color:#b48a64}
    .project-node.active .node-title{color:#b48a64;transform:scale(1.08)}
    .project-node.active .node-glow-ring{
      border-color:rgba(180,140,100,.35);
      opacity:1;
      animation:glowPulse 1.5s ease-in-out infinite;
    }
    @keyframes nodePop{
      0%{transform:scale(1)}
      30%{transform:scale(1.15)}
      70%{transform:scale(.97)}
      100%{transform:scale(1.06)}
    }
    @keyframes glowPulse{
      0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}
      50%{transform:translate(-50%,-50%) scale(1.2);opacity:.15}
    }

    .project-node.dimmed{opacity:.12;filter:blur(1.5px)}
    .project-node.dimmed .node-title{opacity:.12}
    .project-node.dimmed:hover{opacity:.2}

    /* ── Connection Lines ── */
    #connections{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

    /* ── Detail Card (简约版) ── */
    #card-overlay{
      position:fixed;inset:0;z-index:40;
      background:rgba(0,0,0,.12);
      opacity:0;visibility:hidden;
      transition:all .35s;
    }
    #card-overlay.visible{opacity:1;visibility:visible}

    .detail-card{
      position:fixed;top:50%;left:50%;
      width:320px;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:14px;
      padding:0;
      opacity:0;visibility:hidden;
      transform:translate(-50%,-50%) scale(.92) translateY(-8px);
      transition:all .35s cubic-bezier(.22,1,.36,1);
      z-index:50;
      box-shadow:0 20px 60px rgba(0,0,0,.08);
    }
    .detail-card.visible{opacity:1;visibility:visible;transform:translate(-50%,-50%) scale(1) translateY(0)}
    .detail-card .card-connector{
      position:absolute;top:-10px;left:50%;transform:translateX(-50%);
      width:1px;height:10px;background:rgba(0,0,0,.08);
    }
    .detail-card .card-header{
      padding:20px 24px 6px;
      display:flex;justify-content:space-between;align-items:flex-start;
    }
    .detail-card .card-status{
      display:inline-block;padding:3px 14px;
      font-size:.7rem;font-weight:500;letter-spacing:.06em;
      font-family:inherit;
    }
    .detail-card .card-status.completed{color:#1a1a1a;background:rgba(180,140,100,.12);border:1px solid rgba(180,140,100,.2)}
    .detail-card .card-status.in-progress{color:#fff;background:#1a1a1a;border:1px solid #1a1a1a}
    .detail-card .card-status.pending{color:rgba(0,0,0,.4);background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.08)}
    .detail-card .card-title{font-size:1.1rem;font-weight:500;color:#1a1a1a;margin:6px 24px 0;line-height:1.35}
    .detail-card .card-body{padding:10px 24px 16px}
    .detail-card .card-desc{font-size:.85rem;color:rgba(0,0,0,.5);line-height:1.6}

    .detail-card .card-links{padding:10px 24px 14px;border-top:1px solid rgba(0,0,0,.04)}
    .detail-card .card-links .links-label{
      display:flex;align-items:center;gap:5px;
      font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(0,0,0,.3);margin-bottom:8px;
    }
    .detail-card .card-links .links-label svg{width:11px;height:11px;color:#b48a64}
    .detail-card .card-links .link-btn{
      display:inline-flex;align-items:center;gap:4px;
      padding:5px 12px;font-size:.75rem;color:rgba(0,0,0,.55);
      border:1px solid rgba(0,0,0,.08);border-radius:0;
      background:transparent;cursor:pointer;font-family:inherit;
      transition:all .25s;margin:0 4px 6px 0;
    }
    .detail-card .card-links .link-btn:hover{background:rgba(180,140,100,.06);border-color:rgba(180,140,100,.2);color:#1a1a1a}
    .detail-card .card-links .link-btn svg{width:8px;height:8px;color:rgba(0,0,0,.2)}

    .detail-card .card-action{padding:0 24px 18px}
    .detail-card .card-action .visit-btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 18px;font-size:.8rem;font-weight:500;font-family:inherit;
      color:#fff;background:#1a1a1a;
      border:none;cursor:pointer;
      transition:all .25s;
    }
    .detail-card .card-action .visit-btn:hover{background:#b48a64}
    .detail-card .card-action .visit-btn svg{width:13px;height:13px}
    .detail-card .card-action .visit-btn.disabled{background:rgba(0,0,0,.08);color:rgba(0,0,0,.3);cursor:default}
    .detail-card .card-action .visit-btn.disabled:hover{background:rgba(0,0,0,.08)}

    .detail-card .card-close-btn{
      position:absolute;top:12px;right:14px;
      width:26px;height:26px;display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.06);border-radius:50%;
      color:rgba(0,0,0,.2);cursor:pointer;font-size:.75rem;font-family:inherit;
      transition:all .25s;
    }
    .detail-card .card-close-btn:hover{background:rgba(0,0,0,.06);color:#1a1a1a}

    /* ── Footer ── */
    .orbit-footer{position:fixed;bottom:1.5rem;left:0;right:0;z-index:1;text-align:center}
    .orbit-footer p{font-size:.7rem;font-weight:400;letter-spacing:.15em;color:rgba(0,0,0,.25);white-space:pre-line;line-height:1.5}

    /* ── 入场 ── */
    .orbit-view.loaded .project-node{opacity:1}
    .orbit-view.loaded .project-node{transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1)}
    .project-node{opacity:0}

    /* ── Responsive ── */
    @media(max-width:900px){
      .orbit-view{width:100vw;height:100vw;max-width:700px;max-height:700px}
      .orb-ring.r1{width:78vw;height:78vw;max-width:520px;max-height:520px}
      .orb-ring.r2{width:62vw;height:62vw;max-width:420px;max-height:420px}
      .orb-ring.r3{width:40vw;height:40vw;max-width:270px;max-height:270px}
      .center-hub{width:140px;height:140px}
      .center-hub .name-cn{font-size:1.2rem}
      .center-hub .name-en{font-size:.8rem}
      .center-hub .role{font-size:.7rem}
      .project-node .node-title{font-size:1rem}
      .project-node .node-desc{font-size:.7rem}
    }
    @media(max-width:768px){
      body{overflow-y:auto}
      .orbit-view{width:100%;height:auto;flex-direction:column;padding:5rem 1.5rem 3rem;max-width:none}
      .orbit-view .orb-ring,.orb-dot,.pulse-ring,#connections{display:none}
      .center-hub{position:relative;top:auto;left:auto;transform:none!important;margin-bottom:2rem;pointer-events:none;width:150px;height:150px}
      .center-hub .name-cn{font-size:1.25rem}
      .center-hub .name-en{font-size:.85rem}
      .center-hub .role{font-size:.75rem}
      #orbit-nodes{position:relative;width:100%;max-width:400px}
      .project-node{position:relative!important;top:auto!important;left:auto!important;margin-bottom:1rem;display:block;opacity:1!important;width:100%;transform:none!important;animation:none!important}
      .project-node .node-hit{
        width:auto;height:auto;min-height:44px;
        background:#fff;border-radius:14px;padding:1rem 1.25rem;
        box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.05);
        transition:box-shadow .3s,transform .3s;
        cursor:pointer;
      }
      .project-node .node-hit:active{transform:scale(.97);box-shadow:0 1px 4px rgba(0,0,0,.08)}
      .project-node .node-num{text-align:left;font-size:.65rem;margin-bottom:.2rem;color:rgba(0,0,0,.3)}
      .project-node .node-title{text-align:left;font-size:1.1rem;color:#1a1a1a}
      .project-node .node-desc{text-align:left;font-size:.75rem;color:rgba(0,0,0,.5);margin-top:.15rem}
      .project-node .node-glow-ring{display:none}
      .project-node.active .node-hit{animation:none;border-color:#b48a64;box-shadow:0 2px 16px rgba(180,140,100,.15)}
      .project-node.dimmed{opacity:1!important;filter:none!important}

      /* 卡片入场动画：错开淡入上移 */
      @keyframes cardIn{
        from{opacity:0;transform:translateY(20px)}
        to{opacity:1;transform:translateY(0)}
      }
      .orbit-view.loaded .project-node{
        animation:cardIn .5s cubic-bezier(.22,1,.36,1) both!important;
      }
      .orbit-view.loaded .project-node:nth-child(2){animation-delay:.1s!important}
      .orbit-view.loaded .project-node:nth-child(3){animation-delay:.2s!important}
      .orbit-view.loaded .project-node:nth-child(4){animation-delay:.3s!important}

      .detail-card{width:calc(100vw - 40px);max-width:360px}
      #lang-toggle{top:.75rem;right:.75rem;border-radius:12px;padding:3px}
      .lang-btn{font-size:.75rem;padding:.35rem .45rem;border-radius:9px;min-height:44px}
      .lang-btn.active{padding:.35rem .65rem}
      .orbit-footer p{font-size:.7rem;white-space:pre-line;line-height:1.5}
      .project-node.dimmed{opacity:1!important;filter:none!important}
    }
  </style>
</head>
<body>
  <div id="cursor-glow"></div>

  <div id="lang-toggle">
    <button class="lang-btn active" data-lang="zh-CN"><span class="abbr">简</span><span class="full">简体中文</span></button>
    <button class="lang-btn" data-lang="zh-TW"><span class="abbr">繁</span><span class="full">繁體中文</span></button>
    <button class="lang-btn" data-lang="en"><span class="abbr">EN</span><span class="full">English</span></button>
  </div>

  <div class="orbit-wrap">
    <div class="orbit-view" id="orbitView">
      <div class="orb-ring r1"></div>
      <div class="orb-ring r2"></div>
      <div class="orb-ring r3"></div>
      <div class="orb-dot" id="dot0"></div>
      <div class="orb-dot" id="dot1"></div>
      <div class="orb-dot" id="dot2"></div>
      <div class="orb-dot" id="dot3"></div>
      <div class="pulse-ring" id="pulseRing"></div>
      <svg id="connections"></svg>

      <div class="center-hub" id="centerHub">
        <div class="name-cn" id="hubNameCN">戚俊皓</div>
        <div class="name-en" id="hubNameEN">QI JUNHAO</div>
        <div class="role" id="hubRole">项目枢纽</div>
      </div>

      <div id="orbit-nodes"></div>
    </div>
  </div>

  <div id="card-overlay"></div>

  <div class="detail-card" id="detailCard">
    <button class="card-close-btn" id="cardClose">✕</button>
    <div class="card-connector"></div>
    <div class="card-header">
      <span class="card-status" id="cardStatus"></span>
    </div>
    <div class="card-title" id="cardTitle"></div>
    <div class="card-body">
      <p class="card-desc" id="cardDesc"></p>
    </div>

    <div class="card-action">
      <button class="visit-btn" id="cardVisitBtn"><span id="cardVisitLabel">访问项目</span> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
    </div>
  </div>

  <div class="orbit-footer"><p id="footerText">&copy; 2026 戚俊皓<br>版本号：2026/06/26</p></div>

  <script>
    (function(){
      'use strict';

      const projects = [
        { id:0, num:'001', url:'https://777cola.github.io/investment-asset-platform/', related:[2],
          dotAngle:45,
          statusLabel:{'zh-CN':'运行中','zh-TW':'運行中','en':'LIVE'},
          titles:{'zh-CN':'资产管理平台','zh-TW':'資產管理平台','en':'Asset Platform'},
          descs:{'zh-CN':'投资组合管理与分析平台','zh-TW':'投資組合管理與分析平台','en':'Portfolio management & analysis platform'} },
        { id:1, num:'002', url:'#', related:[3],
          dotAngle:135,
          statusLabel:{'zh-CN':'建设中','zh-TW':'建設中','en':'BUILDING'},
          titles:{'zh-CN':'个人网站','zh-TW':'個人網站','en':'Personal Site'},
          descs:{'zh-CN':'戚俊皓个人展示网站','zh-TW':'戚俊皓個人展示網站','en':"Andy Qi's personal showcase website"} },
        { id:2, num:'003', url:'https://777cola.github.io/PowerPulse/', related:[0,3],
          dotAngle:225,
          statusLabel:{'zh-CN':'运行中','zh-TW':'運行中','en':'LIVE'},
          titles:{'zh-CN':'PowerPulse','zh-TW':'PowerPulse','en':'PowerPulse'},
          descs:{'zh-CN':'macOS 菜单栏电池监控与电源管理工具','zh-TW':'macOS 選單欄電池監控與電源管理工具','en':'macOS menu bar battery monitoring & power management tool'} },
        { id:3, num:'004', url:'#', related:[1,2],
          dotAngle:315,
          statusLabel:{'zh-CN':'即将到来','zh-TW':'即將到來','en':'COMING SOON'},
          titles:{'zh-CN':'更多项目','zh-TW':'更多項目','en':'More Projects'},
          descs:{'zh-CN':'更多创意项目即将到来','zh-TW':'更多創意項目即將到來','en':'More creative projects coming soon'} }
      ];

      let currentLang = 'zh-CN';
      let animTime = 0;
      let activeNodeId = null;
      const nodeRefs = [];
      const ORBIT_R = 260; // 缩小轨道半径

      const glow = document.getElementById('cursor-glow');
      const orbitView = document.getElementById('orbitView');
      const nodesContainer = document.getElementById('orbit-nodes');
      const dots = [0,1,2,3].map(i => document.getElementById('dot'+i));
      const hub = document.getElementById('centerHub');
      const pulseRing = document.getElementById('pulseRing');
      const connectionsSvg = document.getElementById('connections');
      const detailCard = document.getElementById('detailCard');
      const cardOverlay = document.getElementById('card-overlay');

      function buildNodes(){
        nodesContainer.innerHTML = '';
        projects.forEach((p, i) => {
          const node = document.createElement('div');
          node.className = 'project-node';
          node.dataset.id = p.id;
          node.innerHTML = `
            <div class="node-hit">
              <div>
                <div class="node-glow-ring"></div>
                <div class="node-num">${p.num}</div>
                <div class="node-title" data-label="title">${p.titles[currentLang]}</div>
                <div class="node-desc" data-label="desc">${p.descs[currentLang]}</div>
              </div>
            </div>
          `;
          node.addEventListener('click', function(e){ e.stopPropagation(); toggleNode(p.id); });
          node.addEventListener('mouseenter', function(){
            if(activeNodeId === null){ if(dots[i]) dots[i].classList.add('active'); pulseRing.classList.add('visible'); }
          });
          node.addEventListener('mouseleave', function(){
            if(activeNodeId === null){ dots.forEach(d => d.classList.remove('active')); pulseRing.classList.remove('visible'); }
          });
          nodesContainer.appendChild(node);
          nodeRefs[i] = node;
        });
      }

      function updatePositions(){
        if(window.innerWidth <= 768) return;
        const total = projects.length;
        nodeRefs.forEach((node, i) => {
          if(!node) return;
          const baseAngle = projects[i].dotAngle;
          const angle = (baseAngle + animTime * 0.003 * 360) % 360;
          const rad = (angle * Math.PI) / 180;
          const x = ORBIT_R * Math.cos(rad);
          const y = ORBIT_R * Math.sin(rad);
          const zIndex = Math.round(100 + 20 * Math.cos(rad));
          const opacity = Math.max(0.3, Math.min(1, 0.3 + 0.7 * ((1 + Math.sin(rad)) / 2)));

          node.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
          node.style.zIndex = zIndex;
          node.style.opacity = opacity;

          if(activeNodeId !== null){
            const p = projects.find(pj => pj.id === activeNodeId);
            const isActive = p && p.id === parseInt(node.dataset.id);
            const isRelated = p && p.related.includes(parseInt(node.dataset.id));
            if(!isActive && !isRelated){
              node.style.opacity = (opacity * 0.12).toString();
              node.classList.add('dimmed');
            } else {
              node.classList.remove('dimmed');
            }
          } else {
            node.classList.remove('dimmed');
          }
        });
        dots.forEach((dot, i) => {
          if(!dot) return;
          const baseAngle = projects[i].dotAngle;
          const angle = (baseAngle + animTime * 0.003 * 360) * Math.PI / 180;
          dot.style.transform = `translate(${Math.cos(angle)*ORBIT_R}px,${Math.sin(angle)*ORBIT_R}px)`;
        });
        drawConnections();
      }

      function drawConnections(){
        if(window.innerWidth <= 768){ connectionsSvg.innerHTML = ''; return; }
        const lines = [];
        const halfW = orbitView.offsetWidth / 2 || 430;
        const halfH = orbitView.offsetHeight / 2 || 430;
        if(activeNodeId !== null){
          const active = projects.find(p => p.id === activeNodeId);
          if(active){
            const aPos = getNodePos(active.id);
            active.related.forEach(rid => {
              const bPos = getNodePos(rid);
              if(bPos) lines.push({x1:aPos.x+halfW, y1:aPos.y+halfH, x2:bPos.x+halfW, y2:bPos.y+halfH});
            });
          }
        }
        connectionsSvg.setAttribute('viewBox', `0 0 ${halfW*2} ${halfH*2}`);
        connectionsSvg.innerHTML = lines.map(l =>
          `<line x1="${l.x1.toFixed(1)}" y1="${l.y1.toFixed(1)}" x2="${l.x2.toFixed(1)}" y2="${l.y2.toFixed(1)}"
            stroke="rgba(180,140,100,0.3)" stroke-width="1" stroke-dasharray="4 3" style="transition:all 0.5s"/>`
        ).join('');
      }

      function getNodePos(id){
        const p = projects.find(pr => pr.id === id);
        if(!p) return null;
        const angle = (p.dotAngle + animTime * 0.003 * 360) * Math.PI / 180;
        return { x: ORBIT_R * Math.cos(angle), y: ORBIT_R * Math.sin(angle) };
      }

      function toggleNode(id){
        if(activeNodeId === id){ closeCard(); return; }
        activeNodeId = id;
        nodeRefs.forEach((node, i) => {
          const p = projects[i];
          node.classList.remove('active');
          if(p.id === id){
            node.classList.add('active');
            if(dots[i]) dots[i].classList.add('active');
          }
        });
        pulseRing.classList.add('visible');
        updatePositions();
        showDetailCard(id);
      }

      function showDetailCard(id){
        const p = projects.find(pr => pr.id === id);
        if(!p) return;
        const lang = currentLang;
        document.getElementById('cardStatus').textContent = p.statusLabel[lang];
        document.getElementById('cardStatus').className = 'card-status ' + (p.url && p.url !== '#' ? 'completed' : 'pending');
        document.getElementById('cardTitle').textContent = p.titles[lang];
        document.getElementById('cardDesc').textContent = p.descs[lang];
        const visitBtn = document.getElementById('cardVisitBtn');
        const visitLabel = {'zh-CN':'访问项目','zh-TW':'訪問項目','en':'View'}[lang];
        document.getElementById('cardVisitLabel').textContent = visitLabel;
        if(p.url && p.url !== '#'){
          visitBtn.onclick = function(){ window.open(p.url, '_blank'); };
          visitBtn.classList.remove('disabled');
        } else {
          visitBtn.onclick = null;
          visitBtn.classList.add('disabled');
        }
        cardOverlay.classList.add('visible');
        detailCard.classList.add('visible');
      }

      function closeCard(){
        activeNodeId = null;
        detailCard.classList.remove('visible');
        cardOverlay.classList.remove('visible');
        nodeRefs.forEach(n => n.classList.remove('active'));
        dots.forEach(d => d.classList.remove('active'));
        pulseRing.classList.remove('visible');
        updatePositions();
      }

      document.getElementById('cardClose').addEventListener('click', closeCard);
      cardOverlay.addEventListener('click', closeCard);

      document.addEventListener('click', function(e){
        if(activeNodeId !== null && !e.target.closest('.project-node') && !e.target.closest('.detail-card') && !e.target.closest('#card-overlay')) closeCard();
      });

      function applyLang(lang){
        currentLang = lang;
        const d = {'zh-CN':{r:'项目枢纽',n:'戚俊皓',s:'QI JUNHAO',f:'© 2026 戚俊皓\n版本号：2026/06/27'},'zh-TW':{r:'項目樞紐',n:'戚俊皓',s:'QI JUNHAO',f:'© 2026 戚俊皓\n版本號：2026/06/27'},'en':{r:'Project Hub',n:'Andy Qi',s:'QI JUNHAO',f:'© 2026 Andy Qi\nVersion: 2026/06/27'}}[lang];
        document.getElementById('hubNameCN').textContent = d.n;
        document.getElementById('hubNameEN').textContent = d.s;
        document.getElementById('hubRole').textContent = d.r;
        document.getElementById('footerText').textContent = d.f;
        document.querySelectorAll('[data-label="title"]').forEach((el, i) => { if(projects[i]) el.textContent = projects[i].titles[lang]; });
        document.querySelectorAll('[data-label="desc"]').forEach((el, i) => { if(projects[i]) el.textContent = projects[i].descs[lang]; });
        document.querySelectorAll('.lang-btn').forEach(b => { b.classList.toggle('active', b.dataset.lang === lang); });
        document.documentElement.lang = lang;
        if(activeNodeId !== null) showDetailCard(activeNodeId);
      }

      document.querySelectorAll('.lang-btn').forEach(b => { b.addEventListener('click', () => applyLang(b.dataset.lang)); });
      document.addEventListener('mousemove', e => { glow.style.transform = `translate(${e.clientX}px,${e.clientY}px)`; });

      buildNodes();
      applyLang('zh-CN');
      requestAnimationFrame(() => { document.getElementById('orbitView').classList.add('loaded'); });

      window.addEventListener('resize', function(){
        if(window.innerWidth <= 640){
          nodeRefs.forEach(node => { if(!node) return; node.style.transform = ''; node.style.opacity = ''; node.style.zIndex = ''; node.classList.remove('dimmed'); });
          connectionsSvg.innerHTML = '';
        }
      });

      function animate(time){
        animTime = time / 1000;
        if(window.innerWidth > 640){
          const fy = Math.sin(time * 0.0008) * 3;
          const fx = Math.cos(time * 0.0007) * 1.5;
          hub.style.transform = `translate(calc(-50% + ${fx}px), calc(-50% + ${fy}px))`;
          document.querySelector('.orb-ring.r1').style.transform = `translate(-50%,-50%) rotate(${time*0.004}deg)`;
          document.querySelector('.orb-ring.r2').style.transform = `translate(-50%,-50%) rotate(${-time*0.006}deg)`;
          document.querySelector('.orb-ring.r3').style.transform = `translate(-50%,-50%) rotate(${time*0.005}deg)`;
        }
        updatePositions();
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
