<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>戚俊皓 · 项目轨道</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+SC:wght@200;300;400;500&family=Noto+Sans+TC:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    body{
      font-family:'Inter','Noto Sans SC','Noto Sans TC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#000;color:#fff;
      min-height:100vh;overflow:hidden;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      user-select:none;
    }
    #cursor-glow{
      position:fixed;pointer-events:none;z-index:0;
      width:600px;height:600px;border-radius:50%;
      background:radial-gradient(circle,rgba(180,140,100,.04) 0%,transparent 70%);
      transform:translate(-50%,-50%);will-change:transform;
    }
    #lang-toggle{
      position:fixed;top:2rem;right:2.5rem;z-index:100;
      display:flex;align-items:center;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;padding:4px;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .lang-btn{
      display:flex;align-items:center;gap:0;
      background:transparent;border:none;
      font-family:inherit;font-size:.8rem;font-weight:400;letter-spacing:.04em;
      color:rgba(255,255,255,.3);
      cursor:pointer;padding:.4rem .5rem;border-radius:12px;
      white-space:nowrap;
      transition:color .3s,background .3s,padding .45s cubic-bezier(.22,1,.36,1);
    }
    .lang-btn .abbr{display:inline-block}
    .lang-btn .full{
      display:inline-block;max-width:0;overflow:hidden;vertical-align:middle;
      white-space:nowrap;
      transition:max-width .45s cubic-bezier(.22,1,.36,1),opacity .3s;
      opacity:0;
    }
    .lang-btn.active{color:#fff;background:rgba(255,255,255,.1);padding:.4rem .85rem}
    .lang-btn.active .full{max-width:80px;opacity:1;margin-left:6px}
    .lang-btn:not(.active):hover{color:rgba(255,255,255,.55);background:rgba(255,255,255,.04)}
    .orbit-wrap{position:relative;z-index:1;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .orbit-view{position:relative;width:900px;height:900px;display:flex;align-items:center;justify-content:center}
    .orb-ring{
      position:absolute;top:50%;left:50%;
      border-radius:50%;transform:translate(-50%,-50%);
      pointer-events:none;will-change:transform;
    }
    .orb-ring.r1{width:720px;height:720px;border:1px solid rgba(255,255,255,.07)}
    .orb-ring.r2{width:560px;height:560px;border:1px dashed rgba(255,255,255,.04)}
    .orb-ring.r3{width:340px;height:340px;border:1px solid rgba(255,255,255,.05)}
    .center-hub{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:120px;height:120px;border-radius:50%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      pointer-events:none;z-index:10;
      will-change:transform;
    }
    .center-hub .core{
      width:72px;height:72px;border-radius:50%;
      background:linear-gradient(135deg,#a78bfa,#6366f1,#14b8a6);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 40px rgba(99,102,241,.25),inset 0 1px 0 rgba(255,255,255,.2);
      animation:corePulse 3s ease-in-out infinite;
    }
    .center-hub .core-inner{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(4px)}
    @keyframes corePulse{0%,100%{box-shadow:0 0 40px rgba(99,102,241,.25)}50%{box-shadow:0 0 60px rgba(99,102,241,.4)}}
    .hub-pulse-ring{
      position:absolute;top:50%;left:50%;
      width:120px;height:120px;margin:-60px 0 0 -60px;
      border-radius:50%;border:1px solid rgba(255,255,255,.06);
      pointer-events:none;animation:hubPing 3s ease-in-out infinite;
    }
    .hub-pulse-ring:nth-child(2){width:150px;height:150px;margin:-75px 0 0 -75px;animation-delay:.8s}
    .hub-pulse-ring:nth-child(3){width:180px;height:180px;margin:-90px 0 0 -90px;animation-delay:1.6s}
    @keyframes hubPing{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:0;transform:scale(1.35)}}
    .center-hub .name-cn{
      font-size:.85rem;font-weight:300;letter-spacing:.08em;
      color:rgba(255,255,255,.5);margin-top:8px;line-height:1.2;
    }
    .center-hub .name-en{
      font-size:.55rem;font-weight:400;letter-spacing:.22em;text-transform:uppercase;
      color:rgba(255,255,255,.35);
    }
    #particles{position:fixed;inset:0;pointer-events:none;z-index:0}
    .orbit-node{
      position:absolute;top:50%;left:50%;
      cursor:pointer;will-change:transform,opacity;
      transition:opacity .5s,filter .5s;
      z-index:5;
    }
    .orbit-node .node-icon{
      width:40px;height:40px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      border:2px solid rgba(255,255,255,.35);
      background:#000;
      transition:all .35s cubic-bezier(.22,1,.36,1);
      position:relative;
    }
    .orbit-node .node-icon svg{width:18px;height:18px;color:rgba(255,255,255,.75);transition:color .35s}
    .orbit-node .node-label{
      position:absolute;top:46px;left:50%;transform:translateX(-50%);
      white-space:nowrap;font-size:.7rem;font-weight:500;letter-spacing:.06em;
      color:rgba(255,255,255,.5);transition:color .35s;
    }
    .orbit-node .node-glow{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      border-radius:50%;pointer-events:none;
      background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 70%);
      transition:all .5s;
    }
    .orbit-node.active .node-icon{
      background:#fff;border-color:#fff;
      transform:scale(1.5);box-shadow:0 0 20px rgba(255,255,255,.2);
    }
    .orbit-node.active .node-icon svg{color:#000}
    .orbit-node.active .node-label{color:#fff;transform:translateX(-50%) scale(1.15)}
    .orbit-node.pulse .node-icon{border-color:rgba(255,255,255,.8);animation:nodePulse 1s ease-in-out infinite}
    .orbit-node.dimmed{opacity:.2;filter:blur(1px)}
    .orbit-node.dimmed .node-label{opacity:.3}
    @keyframes nodePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.15)}50%{box-shadow:0 0 20px 8px rgba(255,255,255,.08)}}
    .detail-card{
      position:fixed;top:50%;left:50%;
      width:280px;
      background:rgba(0,0,0,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.15);
      border-radius:12px;
      padding:0;
      opacity:0;visibility:hidden;
      transform:translate(-50%,-50%) scale(.92) translateY(-8px);
      transition:all .35s cubic-bezier(.22,1,.36,1);
      z-index:50;
      box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(99,102,241,.08);
    }
    .detail-card.visible{opacity:1;visibility:visible;transform:translate(-50%,-50%) scale(1) translateY(0)}
    .detail-card .card-pin{
      position:absolute;top:-8px;left:50%;transform:translateX(-50%);
      width:1px;height:8px;background:rgba(255,255,255,.2);
    }
    .detail-card .card-header{
      padding:16px 20px 10px;
      display:flex;justify-content:space-between;align-items:flex-start;
    }
    .detail-card .card-status{
      display:inline-block;padding:2px 10px;font-size:.6rem;font-weight:600;letter-spacing:.08em;
      border-radius:0;
    }
    .detail-card .card-status.completed{color:#fff;background:#111;border:1px solid #fff}
    .detail-card .card-status.in-progress{color:#000;background:#fff;border:1px solid #fff}
    .detail-card .card-status.pending{color:rgba(255,255,255,.6);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.2)}
    .detail-card .card-date{font-size:.6rem;font-family:'Inter',monospace;color:rgba(255,255,255,.35);margin-top:2px}
    .detail-card .card-title{font-size:.9rem;font-weight:500;color:#fff;margin:8px 16px 0 20px;line-height:1.3}
    .detail-card .card-body{padding:10px 20px 16px}
    .detail-card .card-desc{font-size:.75rem;color:rgba(255,255,255,.65);line-height:1.55}
    .detail-card .card-meta{padding:12px 20px 14px;border-top:1px solid rgba(255,255,255,.06)}
    .detail-card .energy-row{
      display:flex;justify-content:space-between;align-items:center;
      font-size:.7rem;margin-bottom:6px;
    }
    .detail-card .energy-row .label{display:flex;align-items:center;gap:4px;color:rgba(255,255,255,.5)}
    .detail-card .energy-row .label svg{width:10px;height:10px}
    .detail-card .energy-row .value{font-family:'Inter',monospace;color:#fff}
    .detail-card .energy-bar{
      width:100%;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;
    }
    .detail-card .energy-bar-fill{
      height:100%;border-radius:2px;
      background:linear-gradient(90deg,#6366f1,#a78bfa);
      transition:width .8s cubic-bezier(.22,1,.36,1);
    }
    .detail-card .card-links{padding:10px 20px 16px;border-top:1px solid rgba(255,255,255,.06)}
    .detail-card .card-links .links-label{
      display:flex;align-items:center;gap:4px;
      font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);
      margin-bottom:8px;
    }
    .detail-card .card-links .links-label svg{width:10px;height:10px}
    .detail-card .card-links .link-btn{
      display:inline-flex;align-items:center;gap:4px;
      padding:4px 10px;font-size:.65rem;color:rgba(255,255,255,.7);
      border:1px solid rgba(255,255,255,.12);border-radius:0;
      background:transparent;cursor:pointer;
      transition:all .25s;
      margin:0 4px 6px 0;
    }
    .detail-card .card-links .link-btn:hover{background:rgba(255,255,255,.08);color:#fff}
    .detail-card .card-links .link-btn svg{width:8px;height:8px;color:rgba(255,255,255,.4)}
    .detail-card .card-action{padding:0 20px 16px}
    .detail-card .card-action .visit-btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 16px;font-size:.75rem;font-weight:500;
      color:#000;background:#fff;
      border:none;cursor:pointer;
      transition:all .25s;
    }
    .detail-card .card-action .visit-btn:hover{background:rgba(255,255,255,.85)}
    .detail-card .card-action .visit-btn svg{width:12px;height:12px}
    .detail-card .card-close{
      position:absolute;top:12px;right:14px;
      width:22px;height:22px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:50%;
      color:rgba(255,255,255,.4);cursor:pointer;font-size:.7rem;
      transition:all .25s;
    }
    .detail-card .card-close:hover{background:rgba(255,255,255,.12);color:#fff}
    #card-overlay{
      position:fixed;inset:0;z-index:40;
      background:rgba(0,0,0,.5);
      opacity:0;visibility:hidden;
      transition:all .35s;
    }
    #card-overlay.visible{opacity:1;visibility:visible}
    .orbit-footer{
      position:fixed;bottom:1.5rem;left:0;right:0;z-index:2;text-align:center;
    }
    .orbit-footer p{font-size:.55rem;font-weight:400;letter-spacing:.18em;color:rgba(255,255,255,.18);}
    #connections{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
    @media(max-width:900px){
      .orbit-view{width:100vw;height:100vw;max-width:700px;max-height:700px}
      .orb-ring.r1{width:82vw;height:82vw;max-width:550px;max-height:550px}
      .orb-ring.r2{width:65vw;height:65vw;max-width:430px;max-height:430px}
      .orb-ring.r3{width:42vw;height:42vw;max-width:270px;max-height:270px}
      .center-hub{width:90px;height:90px}
      .center-hub .core{width:56px;height:56px}
      .center-hub .core-inner{width:22px;height:22px}
      .center-hub .name-cn{font-size:.7rem}
      .center-hub .name-en{font-size:.45rem}
      .hub-pulse-ring{width:90px;height:90px;margin:-45px 0 0 -45px}
      .hub-pulse-ring:nth-child(2){width:110px;height:110px;margin:-55px 0 0 -55px}
      .hub-pulse-ring:nth-child(3){width:130px;height:130px;margin:-65px 0 0 -65px}
      .orbit-node .node-icon{width:32px;height:32px}
      .orbit-node .node-icon svg{width:15px;height:15px}
      .orbit-node .node-label{font-size:.6rem;top:38px}
    }
    @media(max-width:640px){
      body{overflow-y:auto}
      .orbit-view{width:100%;height:auto;flex-direction:column;padding:6rem 1.5rem 3rem;max-width:none}
      .orbit-view .orb-ring,.hub-pulse-ring{display:none}
      .center-hub{position:relative;top:auto;left:auto;transform:none!important;margin-bottom:3rem;pointer-events:none;width:80px;height:auto}
      .center-hub .core{width:48px;height:48px}
      .center-hub .core-inner{width:18px;height:18px}
      .center-hub .name-cn{font-size:.65rem}
      .center-hub .name-en{font-size:.4rem}
      #orbit-nodes{position:relative;width:100%;max-width:360px;height:auto}
      .orbit-node{position:relative!important;top:auto!important;left:auto!important;margin-bottom:1.25rem;display:flex;align-items:center;gap:12px;opacity:1!important;transform:none!important}
      .orbit-node .node-icon{width:36px;height:36px;flex-shrink:0}
      .orbit-node .node-icon svg{width:16px;height:16px}
      .orbit-node .node-label{position:relative;top:auto;left:auto;transform:none;font-size:.75rem}
      .detail-card{width:calc(100vw - 40px);max-width:320px}
      #lang-toggle{top:1rem;right:1rem;border-radius:12px;padding:3px}
      .lang-btn{font-size:.65rem;padding:.3rem .4rem;border-radius:9px}
      .lang-btn.active{padding:.3rem .6rem}
      #connections{display:none}
    }
  </style>
</head>
<body>
  <div id="cursor-glow"></div>
  <div id="particles"></div>

  <div id="lang-toggle">
    <button class="lang-btn active" data-lang="zh-CN"><span class="abbr">简</span><span class="full">简体中文</span></button>
    <button class="lang-btn" data-lang="zh-TW"><span class="abbr">繁</span><span class="full">繁體中文</span></button>
    <button class="lang-btn" data-lang="en"><span class="abbr">EN</span><span class="full">English</span></button>
  </div>

  <div class="orbit-wrap">
    <div class="orbit-view" id="orbitView">
      <div class="orb-ring r1"></div>
      <div class="orb-ring r2"></div>
      <div class="orb-ring r3"></div>
      <svg id="connections"></svg>
      <div class="center-hub" id="centerHub">
        <div class="hub-pulse-ring"></div>
        <div class="hub-pulse-ring"></div>
        <div class="hub-pulse-ring"></div>
        <div class="core"><div class="core-inner"></div></div>
        <div class="name-cn" id="hubNameCN">戚俊皓</div>
        <div class="name-en" id="hubNameEN">QI JUNHAO</div>
      </div>
      <div id="orbit-nodes"></div>
    </div>
  </div>

  <div id="card-overlay"></div>

  <div class="detail-card" id="detailCard">
    <button class="card-close" id="cardClose">✕</button>
    <div class="card-pin"></div>
    <div class="card-header">
      <div>
        <span class="card-status" id="cardStatus"></span>
        <div class="card-date" id="cardDate"></div>
      </div>
    </div>
    <div class="card-title" id="cardTitle"></div>
    <div class="card-body">
      <p class="card-desc" id="cardDesc"></p>
    </div>
    <div class="card-meta">

        <span class="value" id="cardEnergy">0%</span>
      </div>
      <div class="energy-bar"><div class="energy-bar-fill" id="cardEnergyBar" style="width:0%"></div></div>
    </div>
    <div class="card-links" id="cardLinks">
      <div class="links-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Connected Nodes</div>
      <div id="cardLinksContent"></div>
    </div>
    <div class="card-action">
      <button class="visit-btn" id="cardVisitBtn"><span id="cardVisitLabel">Visit</span> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
    </div>
  </div>

  <div class="orbit-footer"><p id="footerText">&copy; 2026 戚俊皓</p></div>

  <script>
    (function(){
      'use strict';
      const ICONS = {

      const STATUS_LABELS = {
        'zh-CN':{completed:'已完成', 'in-progress':'进行中', pending:'待启动'},
        'zh-TW':{completed:'已完成', 'in-progress':'進行中', pending:'待啟動'},
        'en':{completed:'COMPLETED', 'in-progress':'IN PROGRESS', pending:'PENDING'}
      };
      const VISIT_LABELS = {'zh-CN':'访问项目','zh-TW':'訪問項目','en':'Visit Project'};
      const CONNECTED_LABELS = {'zh-CN':'关联节点','zh-TW':'關聯節點','en':'Connected Nodes'};
      const ENERGY_LABELS = {'zh-CN':'能量等级','zh-TW':'能量等級','en':'Energy Level'};
      const HUB_NAMES = {'zh-CN':'戚俊皓','zh-TW':'戚俊皓','en':'Andy Qi'};
      const HUB_SUBS = {'zh-CN':'QI JUNHAO','zh-TW':'QI JUNHAO','en':'QI JUNHAO'};
      let currentLang = 'zh-CN', rotationAngle = 0, autoRotate = true, activeNodeId = null;
      let isMobile = false;
      const nodeRefs = [];
      const ORBIT_RADIUS = 310;
      const orbitView = document.getElementById('orbitView');
      const nodesContainer = document.getElementById('orbit-nodes');
      const connectionsSvg = document.getElementById('connections');
      const detailCard = document.getElementById('detailCard');
      const cardOverlay = document.getElementById('card-overlay');
      const glow = document.getElementById('cursor-glow');
      const particlesEl = document.getElementById('particles');

      function buildNodes(){
        nodesContainer.innerHTML = '';
        projects.forEach((p, i) => {
          const node = document.createElement('div');
          node.className = 'orbit-node';
          node.dataset.id = p.id;
          const glowSize = 40 + p.energy * 0.4;
          node.innerHTML = `<div class="node-glow" style="width:${glowSize}px;height:${glowSize}px"></div><div class="node-icon">${ICONS[p.icon]}</div><div class="node-label" data-label="true">${p.titles[currentLang]}</div>`;
          node.addEventListener('click', function(e){ e.stopPropagation(); toggleNode(p.id); });
          nodesContainer.appendChild(node);
          nodeRefs[i] = node;
        });
      }

      function updatePositions(){
        const total = projects.length;
        if(window.innerWidth <= 640) return;
        nodeRefs.forEach((node, i) => {
          if(!node) return;
          const angle = ((i / total) * 360 + rotationAngle) % 360;
          const rad = (angle * Math.PI) / 180;
          const x = ORBIT_RADIUS * Math.cos(rad), y = ORBIT_RADIUS * Math.sin(rad);
          const zIndex = Math.round(100 + 20 * Math.cos(rad));
          const opacity = Math.max(0.35, Math.min(1, 0.35 + 0.65 * ((1 + Math.sin(rad)) / 2)));
          node.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
          node.style.zIndex = zIndex;
          node.style.opacity = opacity;
          if(activeNodeId !== null){
            const p = projects.find(pj => pj.id === activeNodeId);
            const isActive = p && p.id === parseInt(node.dataset.id);
            const isRelated = p && p.related.includes(parseInt(node.dataset.id));
            if(!isActive && !isRelated){ node.style.opacity = (opacity * 0.25); node.style.filter = 'blur(1px)'; }
            else { node.style.filter = 'none'; }
          } else { node.style.filter = 'none'; }
        });
        drawConnections();
      }

      function drawConnections(){
        if(window.innerWidth <= 640){ connectionsSvg.innerHTML = ''; return; }
        const total = projects.length;
        const lines = [];
        const halfW = orbitView.offsetWidth / 2 || 450;
        const halfH = orbitView.offsetHeight / 2 || 450;
        if(activeNodeId !== null){
          const active = projects.find(p => p.id === activeNodeId);
          if(active){
            const idx = projects.indexOf(active);
            const aPos = getNodePos(idx, total);
            active.related.forEach(rid => {
              const relIdx = projects.findIndex(p => p.id === rid);
              if(relIdx >= 0){
                const bPos = getNodePos(relIdx, total);
                lines.push({x1:aPos.x+halfW, y1:aPos.y+halfH, x2:bPos.x+halfW, y2:bPos.y+halfH, highlight:true});
              }
            });
          }
        }
        connectionsSvg.setAttribute('viewBox', `0 0 ${halfW*2} ${halfH*2}`);
        connectionsSvg.innerHTML = lines.map(l =>
          `<line x1="${l.x1.toFixed(1)}" y1="${l.y1.toFixed(1)}" x2="${l.x2.toFixed(1)}" y2="${l.y2.toFixed(1)}" stroke="${l.highlight?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.04)'}" stroke-width="${l.highlight?'1.5':'0.5'}" stroke-dasharray="${l.highlight?'':'4 4'}" style="transition:all 0.5s"/>`
        ).join('');
      }

      function getNodePos(idx, total){
        const angle = ((idx / total) * 360 + rotationAngle) % 360;
        const rad = (angle * Math.PI) / 180;
        return { x: ORBIT_RADIUS * Math.cos(rad), y: ORBIT_RADIUS * Math.sin(rad) };
      }

      function toggleNode(id){
        if(activeNodeId === id){ closeCard(); return; }
        activeNodeId = id; autoRotate = false;
        nodeRefs.forEach((node, i) => {
          const p = projects[i];
          node.classList.remove('active','pulse','dimmed');
          if(p.id === id) node.classList.add('active');
          else if(p.related.includes(id)) node.classList.add('pulse');
          else node.classList.add('dimmed');
        });
        updatePositions();
        const idx = projects.findIndex(p => p.id === id);
        if(idx >= 0) rotationAngle = 270 - (idx / projects.length) * 360;
        showDetailCard(id);
      }

      function showDetailCard(id){
        const p = projects.find(pr => pr.id === id);
        if(!p) return;
        const lang = currentLang;
        document.getElementById('cardStatus').textContent = STATUS_LABELS[lang][p.status];
        document.getElementById('cardStatus').className = 'card-status ' + p.status;
        document.getElementById('cardTitle').textContent = p.titles[lang];
        document.getElementById('cardDesc').textContent = p.descs[lang];
        document.getElementById('cardEnergy').textContent = p.energy + '%';
        document.getElementById('cardEnergyBar').style.width = p.energy + '%';
        const now = new Date();
        document.getElementById('cardDate').textContent = now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0');
        const visitBtn = document.getElementById('cardVisitBtn');
        document.getElementById('cardVisitLabel').textContent = VISIT_LABELS[lang];
        if(p.url && p.url !== '#'){ visitBtn.onclick = function(){ window.open(p.url + (p.langUrl[lang]||''), '_blank'); }; visitBtn.style.opacity = '1'; visitBtn.style.cursor = 'pointer'; }
        else { visitBtn.onclick = null; visitBtn.style.opacity = '0.35'; visitBtn.style.cursor = 'default'; }
        const linksContent = document.getElementById('cardLinksContent');
        if(p.related.length > 0){
          document.getElementById('cardLinks').style.display = 'block';
          linksContent.innerHTML = p.related.map(rid => {
            const rel = projects.find(r => r.id === rid);
            if(!rel) return '';
            return `<button class="link-btn" data-id="${rid}">${rel.titles[lang]}${ICONS.arrow.replace('width="24"','width="8" height="8"').replace('stroke-width="2"','stroke-width="1.5"')}</button>`;
          }).join('');
          linksContent.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('click', function(e){ e.stopPropagation(); toggleNode(parseInt(this.dataset.id)); });
          });
        } else { document.getElementById('cardLinks').style.display = 'none'; }
        requestAnimationFrame(() => { cardOverlay.classList.add('visible'); detailCard.classList.add('visible'); });
      }

      function closeCard(){
        activeNodeId = null; autoRotate = true;
        detailCard.classList.remove('visible'); cardOverlay.classList.remove('visible');
        nodeRefs.forEach(n => { n.classList.remove('active','pulse','dimmed'); });
        updatePositions();
      }

      document.getElementById('cardClose').addEventListener('click', closeCard);
      cardOverlay.addEventListener('click', closeCard);

      function applyLang(lang){
        currentLang = lang;
        document.getElementById('hubNameCN').textContent = HUB_NAMES[lang];
        document.getElementById('hubNameEN').textContent = HUB_SUBS[lang];
        document.querySelectorAll('[data-label]').forEach((el, i) => { if(projects[i]) el.textContent = projects[i].titles[lang]; });
        document.getElementById('footerText').textContent = {'zh-CN':'© 2026 戚俊皓','zh-TW':'© 2026 戚俊皓','en':'© 2026 Andy Qi'}[lang];
        document.querySelectorAll('.lang-btn').forEach(b => { b.classList.toggle('active', b.dataset.lang === lang); });
        document.documentElement.lang = lang;
        if(activeNodeId !== null) showDetailCard(activeNodeId);
      }

      document.querySelectorAll('.lang-btn').forEach(b => { b.addEventListener('click', () => applyLang(b.dataset.lang)); });
      document.addEventListener('mousemove', e => { glow.style.transform = `translate(${e.clientX}px,${e.clientY}px)`; });

      function createParticles(){
        for(let i=0;i<30;i++){
          const p = document.createElement('div');
          const s = 1 + Math.random() * 1.5;
          p.style.cssText = `position:absolute;width:${s}px;height:${s}px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;`;
          particlesEl.appendChild(p);
          const bx = Math.random() * window.innerWidth, by = Math.random() * window.innerHeight;
          const sp = 0.15 + Math.random() * 0.25;
          let ph = Math.random() * Math.PI * 2;
          (function drft(){ ph += 0.004; const dx = Math.sin(ph) * 25 * sp, dy = Math.cos(ph * 1.3) * 20 * sp; p.style.transform = `translate(${bx+dx}px,${by+dy}px)`; requestAnimationFrame(drft); })();
        }
      }
      createParticles();

      document.addEventListener('click', function(e){
        if(activeNodeId !== null && !e.target.closest('.orbit-node') && !e.target.closest('.detail-card') && !e.target.closest('#card-overlay')) closeCard();
      });

      window.addEventListener('resize', function(){
        isMobile = window.innerWidth <= 640;
        if(isMobile){ nodeRefs.forEach(node => { if(!node) return; node.style.transform = ''; node.style.opacity = ''; node.style.zIndex = ''; node.style.filter = ''; node.classList.remove('dimmed','pulse'); }); connectionsSvg.innerHTML = ''; }
      });

      buildNodes();
      applyLang('zh-CN');

      function animate(time){
        if(window.innerWidth <= 640){ requestAnimationFrame(animate); return; }
        if(autoRotate) rotationAngle = (rotationAngle + 0.15) % 360;
        updatePositions();
        const fy = Math.sin(time * 0.0006) * 2, fx = Math.cos(time * 0.0005) * 1;
        document.getElementById('centerHub').style.transform = `translate(calc(-50% + ${fx}px), calc(-50% + ${fy}px))`;
        document.querySelector('.orb-ring.r1').style.transform = `translate(-50%,-50%) rotate(${time*0.003}deg)`;
        document.querySelector('.orb-ring.r2').style.transform = `translate(-50%,-50%) rotate(${-time*0.005}deg)`;
        document.querySelector('.orb-ring.r3').style.transform = `translate(-50%,-50%) rotate(${time*0.004}deg)`;
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
      isMobile = window.innerWidth <= 640;
      setTimeout(() => updatePositions(), 100);
    })();
  </script>
</body>
</html>
